<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pollito Deportivo 🐔</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
  text-align: center;
  transition: 0.5s;
  background: #87ceeb;
}

/* Calle */
.calle {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 120px;
  background: #2b2b2b;
}

.linea {
  position: absolute;
  bottom: 60px;
  width: 100%;
  height: 5px;
  background: repeating-linear-gradient(
    to right,
    white 0px,
    white 40px,
    transparent 40px,
    transparent 80px
  );
}

/* 🐔 Pollito */
.auto {
  position: absolute;
  bottom: 120px;
  left: 0px;
  transition: left 0.4s linear;
  font-size: 60px;
}

#pollo {
  display: inline-block;
}

/* Texto */
#distancia {
  margin-top: 20px;
  font-size: 22px;
}

#estado {
  font-size: 24px;
  margin-top: 10px;
}

</style>
</head>

<body>

<h1>🐔 Pollito Inteligente</h1>
<div id="distancia">Cargando...</div>
<div id="estado"></div>

<div class="auto" id="auto">
  <div id="pollo">🐔</div>
</div>

<div class="calle"></div>
<div class="linea"></div>

<script>

const token = "43658b70-5662-4b92-8c59-8e4df8e82155";

function actualizar() {

  fetch("https://api.tago.io/data?variable=distancia", {
    headers: { "Device-Token": token }
  })
  .then(res => res.json())
  .then(data => {

    let d = data.result[0].value;

    document.getElementById("distancia").innerHTML =
      "Distancia: " + d + " cm";

    let auto = document.getElementById("auto");
    let estado = document.getElementById("estado");

    let max = window.innerWidth - 150;
    let pos = (d / 100) * max;

    if (pos < 0) pos = 0;
    if (pos > max) pos = max;

    auto.style.left = pos + "px";

    // 🌙 modo noche
    if (d < 20) {
      document.body.style.background = "#0b1a2a";
    } else {
      document.body.style.background = "#87ceeb";
    }

    // 🐔 comportamiento creativo
    if (d < 15) {
      estado.innerHTML = "🛑 El pollito se asusta y se detiene";
    } 
    else if (d < 30) {
      estado.innerHTML = "👀 El pollito avanza con cuidado";
    } 
    else {
      estado.innerHTML = "🏃 ¡El pollito va con todo!";
    }

  })
  .catch(err => console.log(err));
}

setInterval(actualizar, 700);

</script>

</body>
</html>
