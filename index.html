<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pollito 🐔</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  text-align: center;
  background: #a8e6a1; /* verde tipo granja */
}

/* Suelo */
.suelo {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 120px;
  background: #8b5a2b;
}

/* Pollito */
#pollo {
  position: absolute;
  bottom: 120px;
  left: 0;
  font-size: 60px;
  transition: left 0.4s linear;
}

/* Maíz */
#maiz {
  position: absolute;
  right: 20px;
  bottom: 130px;
  font-size: 50px;
}

#estado {
  font-size: 24px;
  margin-top: 10px;
}

</style>
</head>

<body>

<h1>🐔 Pollito Inteligente</h1>
<div id="estado">Cargando...</div>

<div id="pollo">🐔</div>
<div id="maiz">🌽</div>

<div class="suelo"></div>

<script>

const token = "43658b70-5662-4b92-8c59-8e4df8e82155";

function actualizar() {

  fetch("https://api.tago.io/data?variable=distancia", {
    headers: { "Device-Token": token }
  })
  .then(res => res.json())
  .then(data => {

    let d = data.result[0].value;

    let pollo = document.getElementById("pollo");
    let estado = document.getElementById("estado");

    let max = window.innerWidth - 100;
    let pos = (d / 100) * max;

    if (pos < 0) pos = 0;
    if (pos > max) pos = max;

    pollo.style.left = pos + "px";

    // 🐔 Mensajes simples
    if (d < 15) {
      estado.innerHTML = "😰 ¡Me detengo!";
    } 
    else if (d < 30) {
      estado.innerHTML = "👀 Voy con cuidado...";
    } 
    else {
      estado.innerHTML = "🏃 ¡Allá voy por el maíz!";
    }

  })
  .catch(err => console.log(err));
}

setInterval(actualizar, 700);

</script>

</body>
</html>
