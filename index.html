<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pollo Inteligente </title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
  text-align: center;
  transition: 0.5s;
  background: #87ceeb;
}

/* Calle */
.calle {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 120px;
  background: #2b2b2b;
}

.linea {
  position: absolute;
  bottom: 60px;
  width: 100%;
  height: 5px;
  background: repeating-linear-gradient(
    to right,
    white 0px,
    white 40px,
    transparent 40px,
    transparent 80px
  );
}

/* 🐔 POLLO */
.auto {
  position: absolute;
  bottom: 120px;
  left: 0px;
  transition: left 0.4s linear;
}

/* cuerpo del pollo */
.cuerpo {
  width: 60px;
  height: 60px;
  background: yellow;
  border-radius: 50%;
  position: relative;
}

/* ojo */
.ojo {
  width: 10px;
  height: 10px;
  background: black;
  border-radius: 50%;
  position: absolute;
  top: 15px;
  left: 40px;
}

/* pico */
.pico {
  width: 0;
  height: 0;
  border-left: 10px solid orange;
  border-top: 5px solid transparent;
  border-bottom: 5px solid transparent;
  position: absolute;
  top: 25px;
  left: 55px;
}

/* patas */
.pata {
  width: 8px;
  height: 20px;
  background: orange;
  position: absolute;
  bottom: -15px;
}

.p1 { left: 15px; }
.p2 { left: 35px; }

/* animación patas */
@keyframes girar {
  from { transform: rotate(0deg); }
  to { transform: rotate(20deg); }
}

.girando {
  animation: girar 0.3s linear infinite alternate;
}

/* humo (lo dejamos igual) */
.humo {
  position: absolute;
  left: -20px;
  bottom: 10px;
  width: 12px;
  height: 12px;
  background: gray;
  border-radius: 50%;
  opacity: 0;
}

@keyframes humoAnim {
  0% { transform: translateY(0) scale(1); opacity: 0.6; }
  100% { transform: translateY(-40px) scale(2); opacity: 0; }
}

.humo.activo {
  animation: humoAnim 1s infinite;
}

/* Texto */
#distancia {
  margin-top: 20px;
  font-size: 22px;
}

#estado {
  font-size: 24px;
  margin-top: 10px;
}

</style>
</head>

<body>

<h1>🐔 Pollo Inteligente</h1>
<div id="distancia">Cargando...</div>
<div id="estado"></div>

<div class="auto" id="auto">

  <div class="cuerpo">
    <div class="ojo"></div>
    <div class="pico"></div>
  </div>

  <div class="pata p1" id="r1"></div>
  <div class="pata p2" id="r2"></div>

  <div class="humo" id="humo"></div>

</div>

<div class="calle"></div>
<div class="linea"></div>

<script>

const token = "43658b70-5662-4b92-8c59-8e4df8e82155";

function actualizar() {

  fetch("https://api.tago.io/data?variable=distancia", {
    headers: { "Device-Token": token }
  })
  .then(res => res.json())
  .then(data => {

    let d = data.result[0].value;

    document.getElementById("distancia").innerHTML =
      "Distancia: " + d + " cm";

    let auto = document.getElementById("auto");
    let estado = document.getElementById("estado");
    let freno = document.getElementById("freno");
    let humo = document.getElementById("humo");

    let r1 = document.getElementById("r1");
    let r2 = document.getElementById("r2");

    let max = window.innerWidth - 150;
    let pos = (d / 100) * max;

    if (pos < 0) pos = 0;
    if (pos > max) pos = max;

    auto.style.left = pos + "px";

    if (d < 20) {
      document.body.style.background = "#0b1a2a";
    } else {
      document.body.style.background = "#87ceeb";
    }

    if (d < 15) {
      estado.innerHTML = "🚨 FRENANDO";
      humo.classList.remove("activo");
      r1.classList.remove("girando");
      r2.classList.remove("girando");
    } 
    else if (d < 30) {
      estado.innerHTML = "⚠️ Acercándose";
      humo.classList.add("activo");
      r1.classList.add("girando");
      r2.classList.add("girando");
    } 
    else {
      estado.innerHTML = "🟢 A TODA VELOCIDAD";
      humo.classList.add("activo");
      r1.classList.add("girando");
      r2.classList.add("girando");
    }

  })
  .catch(err => console.log(err));
}

setInterval(actualizar, 700);

</script>

</body>
</html>
