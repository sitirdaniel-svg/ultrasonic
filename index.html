<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pollito Inteligente 🐔</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
  text-align: center;
  transition: 0.5s;
  background: url('https://i.imgur.com/8bKQX7K.jpg') no-repeat center/cover;
}

/* Suelo granja */
.calle {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 120px;
  background: #7c4a2d;
}

/* 🐔 Pollito */
.auto {
  position: absolute;
  bottom: 120px;
  left: 0px;
  transition: left 0.4s linear;
  font-size: 60px;
}

/* 🌽 Premio */
.maiz {
  position: absolute;
  right: 20px;
  bottom: 140px;
  font-size: 50px;
}

/* Texto */
#distancia {
  margin-top: 20px;
  font-size: 22px;
  color: white;
}

#estado {
  font-size: 26px;
  margin-top: 10px;
  color: yellow;
}

</style>
</head>

<body>

<h1>🐔 Pollito Inteligente en la Granja</h1>
<div id="distancia">Cargando...</div>
<div id="estado"></div>

<div class="auto" id="auto">
  🐔
</div>

<div class="maiz">🌽</div>

<div class="calle"></div>

<script>

const token = "43658b70-5662-4b92-8c59-8e4df8e82155";

function actualizar() {

  fetch("https://api.tago.io/data?variable=distancia", {
    headers: { "Device-Token": token }
  })
  .then(res => res.json())
  .then(data => {

    let d = data.result[0].value;

    document.getElementById("distancia").innerHTML =
      "Distancia: " + d + " cm";

    let auto = document.getElementById("auto");
    let estado = document.getElementById("estado");

    let max = window.innerWidth - 150;
    let pos = (d / 100) * max;

    if (pos < 0) pos = 0;
    if (pos > max) pos = max;

    auto.style.left = pos + "px";

    // 🌙 modo noche
    if (d < 20) {
      document.body.style.filter = "brightness(0.5)";
    } else {
      document.body.style.filter = "brightness(1)";
    }

    // 🐔 comportamiento creativo
    if (d < 15) {
      estado.innerHTML = "🛑 ¡voy con todoo!";
    } 
    else if (d < 30) {
      estado.innerHTML = "👀 Mmm… algo hay por ahí";
    } 
    else {
      estado.innerHTML = "🏃‍♂️ ¡AQUÍ VOYYY POR EL MAÍZ!";
    }

  })
  .catch(err => console.log(err));
}

setInterval(actualizar, 700);

</script>

</body>
</html>
